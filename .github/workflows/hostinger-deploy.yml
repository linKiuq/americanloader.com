name: Hostinger Auto Deploy (Old Server)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy via LFTP to Old Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          
      - name: Install Dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-scripts
        
      - name: Sync via FTP using lftp
        env:
          FTP_HOST: "195.184.64.49"
          FTP_USER: "u504000170"
          FTP_PASS: "KhmerLucky#2026"
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          lftp -c "set ftp:ssl-allow no; open -u $FTP_USER,$FTP_PASS ftp://$FTP_HOST; mirror -R --verbose --exclude-glob .git/ ./ public_html/"
