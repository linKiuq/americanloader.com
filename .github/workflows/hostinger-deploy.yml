name: Hostinger Auto Deploy (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Prepare environment
        run: |
          cp .env.example .env

      - name: Install PHP Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
          php artisan key:generate || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install NPM Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Sync via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: "195.184.64.49"
          username: "u504000170"
          password: "KhmerLucky#2026"
          server-dir: "./laravel/"
          protocol: "ftp"
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
